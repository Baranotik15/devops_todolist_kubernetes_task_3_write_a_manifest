apiVersion: v1
kind: Pod
metadata:
  name: todoapp
  namespace: todoapp
spec:
  containers:
    - name: todoapp
      image: baranotik/todoapp:3.0.0
      ports:
        - containerPort: 8080
      readinessProbe:
        httpGet:
          path: /api/readiness/
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 10
      livenessProbe:
        httpGet:
          path: /api/health/
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 20
